<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrsist Leaderboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="leaderboard-page">
    <div class="card leaderboard-card">
        <h1 class="page-title">Leaderboard</h1>
        <div class="leaderboard-layout">
            
            <div class="leaderboard-section">
                <h2 class="leaderboard-title">Ranking</h2>
                <div class="leaderboard-list">
                    <div class="leaderboard-entry first-place">
                        <span class="friend-name">User A</span>
                        <span class="friend-streak">X days</span>
                    </div>

                    <div class="leaderboard-entry second-place">
                        <span class="friend-name">User B</span>
                        <span class="friend-streak">X days</span>
                    </div>

                    <div class="leaderboard-entry third-place">
                        <span class="friend-name">User C</span>
                        <span class="friend-streak">X days</span>
                    </div>

                    <div class="leaderboard-entry">
                        <span class="friend-name">other users</span>
                        <span class="friend-streak">X days</span>
                    </div>
                </div>
            </div>
            
            <div class="leaderboard-section">
                <h2 class="leaderboard-title">Friends' Activity</h2>
                <div class="activity-feed">
                    {% for activity in activities %}
                    <div class="activity-item">{{ activity.message }}</div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
