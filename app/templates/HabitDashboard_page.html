<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrsist Habit Dashboard</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css" />
</head>
<body class="habit-dashboard-page">
    <div class="card">
        <h1 class="page-title">Habit Dashboard</h1>
        <p class="page-subtitle">Today's Habits</p>

        <div class="habit-list">
            <div class="habit-card">
                <p class="habit-text">Study</p>
                <button class="complete-btn">Complete</button>
            </div>

            <div class="habit-card">
                <p class="habit-text">Exercise</p>
                <button class="complete-btn">Complete</button>
            </div>

            <div class="habit-card">
                <p class="habit-text">Drink Water</p>
                <button class="complete-btn">Complete</button>
            </div>
        </div>

        <div class="progress-section">
            <p class="progress-label">Today's Progress</p>
            <div class="progress-bar">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="next-reward">
            <p>Next reward: X to go</p>
        </div>
    </div>
</body>
</html>
