<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrsist Friend List</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body class="friends-page">
    {% include "navbar.html" %}

    <div class="card">
      <h1 class="page-title">Friends</h1>

      <div class="add-friend-section">
        <h2 class="section-title">Add Friend</h2>

        <div class="add-friend-form">
          <input
            type="text"
            class="input-field"
            placeholder="Enter username"
            aria-label="Enter username"
          />
          <button class="submit-friend-btn">
            <i class="bi bi-person-plus"></i>
            Add
          </button>
        </div>
      </div>

      <div class="friends-section">
        <h2 class="section-title">Your Friends</h2>

        <div class="friends-list">
          {% for friend in friends %}
          <a href="#" class="friend-item">
            <div class="avatar">
              <img
                src="{{ url_for('static', filename='images/profile-placeholder.png') }}"
              />
              alt="Profile placeholder" />
            </div>

            <span class="friend-name">{{ friend.username }}</span>
          </a>
          {% endfor %}
        </div>
      </div>
    </div>
  </body>
</html>
