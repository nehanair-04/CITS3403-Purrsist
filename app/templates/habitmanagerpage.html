<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Purrsist! - Habit Manager</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="card">
      <h2 class="page-title">Habit Manager</h2>
      <p class="page-subtitle">Edit your habits or add new ones</p>

      <div id="habit-list">
        <div class="habit-card">
          <div class="habit-row">
            <span class="pixel-small">Study 2 hours</span>
            <button class="pixel-small edit-btn">EDIT</button>
          </div>
        </div>

        <div class="habit-card">
          <div class="habit-row">
            <span class="pixel-small">Exercise</span>
            <button class="pixel-small edit-btn">EDIT</button>
          </div>
        </div>

        <div class="habit-card">
          <div class="habit-row">
            <span class="pixel-small">Drink water</span>
            <button class="pixel-small edit-btn">EDIT</button>
          </div>
        </div>
      </div>

      <div style="margin-top: 16px">
        <button id="add-habit-btn">+ ADD HABIT</button>
      </div>
    </div>
  </body>
</html>
