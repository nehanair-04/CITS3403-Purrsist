<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrsist Friend's Profile</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body class="friend-profile-page">
    <div class="card profile-card">
      <h1 class="page-title">Friend's Profile</h1>
      <div class="profile-header">
        <div class="avatar">
          <img src="images/profile-placeholder.png" alt="Profile placeholder" />
        </div>
        <p class="profile-name">Friend Name</p>
      </div>

      <div class="profile-stats">
        <div class="stat-item">
          <p class="stat-label">Habits Completed</p>
          <p class="stat-value">X</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Longest Streak</p>
          <p class="stat-value">X days</p>
        </div>
        <div class="stat-item">
          <p class="stat-label">Cats Collected</p>
          <p class="stat-value">X</p>
        </div>
      </div>

      <div class="streak-display">
        <span class="streak-days">X days</span>
      </div>

      <div class="history-section">
        <h2 class="history-title">History</h2>

        <div class="history-grid">
          <div class="history-day">Day1</div>
          <div class="history-day">Day2</div>
          <div class="history-day">Day3</div>
          <div class="history-day">Day4</div>
          <div class="history-day">Day5</div>
          <div class="history-day">Day6</div>
          <div class="history-day">Day7</div>
        </div>
      </div>
    </div>
  </body>
</html>
