<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrsist Profile</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body class="profile-page">
    {% include "navbar.html" %}

    <div class="card profile-card">
      <h1 class="page-title">My Profile</h1>

      <div class="profile-header">
        <div class="avatar">
          <img
            src="{{ url_for('static', filename='images/profile-placeholder.png') }}"
            alt="Profile image"
          />
        </div>

        <p class="profile-name">{{ user.username }}</p>
      </div>

      <!-- STATS -->
      <div class="profile-stats">
        <div class="stat-item">
          <p class="stat-label">Habits Completed</p>
          <p class="stat-value">{{ habits_completed }}</p>
        </div>

        <div class="stat-item">
          <p class="stat-label">Longest Streak</p>
          <p class="stat-value">0 days</p>
        </div>

        <div class="stat-item">
          <p class="stat-label">Cats Collected</p>
          <p class="stat-value">0</p>
        </div>
      </div>

      <div class="streak-display">
        <span class="streak-days">0 days</span>
      </div>

      <div class="history-section">
        <h2 class="history-title">History</h2>

        <div class="history-grid">
          <div class="history-day">Day1</div>
          <div class="history-day">Day2</div>
          <div class="history-day">Day3</div>
          <div class="history-day">Day4</div>
          <div class="history-day">Day5</div>
          <div class="history-day">Day6</div>
          <div class="history-day">Day7</div>
        </div>
      </div>
    </div>
  </body>
</html>
