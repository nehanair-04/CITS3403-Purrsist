<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrsist Cat Shelter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="cat-shelter-page">
    <div class="card">
      <h1 class="page-title">Cat Shelter</h1>
      <p class="page-subtitle">Your Collection</p>

      <div class="cat-grid">
        <div class="cat-slot">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Luna</div>
          <div class="rarity-label">Common</div>
        </div>

        <div class="cat-slot">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Mochi</div>
          <div class="rarity-label">Common</div>
        </div>

        <div class="cat-slot rare">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Astro</div>
          <div class="rarity-label">Rare</div>
        </div>

        <div class="cat-slot">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Coco</div>
          <div class="rarity-label">Common</div>
        </div>

        <div class="cat-slot">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Milo</div>
          <div class="rarity-label">Common</div>
        </div>

        <div class="cat-slot rare">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Nova</div>
          <div class="rarity-label">Rare</div>
        </div>

        <div class="cat-slot empty">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Peach</div>
          <div class="rarity-label">Common</div>
        </div>

        <div class="cat-slot empty">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Bean</div>
          <div class="rarity-label">Common</div>
        </div>
      </div>

      <div class="happiness-section">
        <p class="happiness-label">Cat Happiness</p>
        <div class="happiness-status">
          <div class="happiness-bar-fill"></div>
        </div>
      </div>
    </div>
  </body>
</html>
