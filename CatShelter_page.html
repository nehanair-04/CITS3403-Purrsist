<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrsist Cat Shelter</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="cat-shelter-page">
    <div class="card">
      <h1 class="page-title">Cat Shelter</h1>
      <p class="page-subtitle">Your Collection</p>

      <div class="cat-grid">
        <div class="cat-slot" data-streak="7" data-completed-today="true">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Luna</div>
          <div class="rarity-label">Common</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot" data-streak="4" data-completed-today="false">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Mochi</div>
          <div class="rarity-label">Common</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot rare" data-streak="10" data-completed-today="true">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Astro</div>
          <div class="rarity-label">Rare</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot" data-streak="1" data-completed-today="false">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Coco</div>
          <div class="rarity-label">Common</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot" data-streak="3" data-completed-today="false">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Milo</div>
          <div class="rarity-label">Common</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot rare" data-streak="8" data-completed-today="true">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Nova</div>
          <div class="rarity-label">Rare</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot empty">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Peach</div>
          <div class="rarity-label">Common</div>
          <div class="happiness-text">Happiness: </div>
        </div>

        <div class="cat-slot empty">
          <div class="cat-image-placeholder">
            <img src="images/cat-example.jpg" alt="Cat placeholder" />
          </div>
          <div class="cat-name-tag">Bean</div>
          <div class="rarity-label">Common</div>
          <div class="happiness-text">Happiness: </div>
        </div>
      </div>

      <div class="happiness-section">
        <p class="happiness-label">Cat Happiness</p>
        <div class="happiness-status">
          <div class="happiness-bar-fill"></div>
        </div>
        <p class="happiness-note">
          Happiness is based on the user's streak and daily activity.
        </p>
      </div>
    </div>

    <script>
      // Decide cat happiness based on user's streak and activity
      function getCatHappiness(streak, completedToday) {
        if (completedToday && streak >= 7) {
          return "happy";
        }

        if (completedToday || streak >= 3) {
          return "neutral";
        }

        return "sad";
      }

      // Update each cat card with the correct happiness status
      function updateCatHappiness() {
        const catSlots = document.querySelectorAll(".cat-slot:not(.empty)");

        catSlots.forEach((cat) => {
          const streak = Number(cat.dataset.streak);
          const completedToday = cat.dataset.completedToday === "true";  // completedToday is boolean

          const happiness = getCatHappiness(streak, completedToday);
          const happinessText = cat.querySelector(".happiness-text");

          if (happinessText) {
            happinessText.textContent = `Happiness: ${happiness}`;
          }

          cat.classList.remove("happy", "neutral", "sad");
          cat.classList.add(happiness);
        });
      }

      document.addEventListener("DOMContentLoaded", updateCatHappiness);
    </script>
  </body>
</html>
