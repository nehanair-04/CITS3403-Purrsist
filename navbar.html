<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrsist! Test</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-title">Purrsist!</div>
      <div class="nav-links">
        <a href="#" class="nav-item">
          <i class="bi bi-house"></i>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item">
          <i class="bi bi-list-check"></i>
          <span>Habits</span>
        </a>
        <a href="CatShelter_page.html" class="nav-item">
          <i class="bi bi-heart"></i>
          <span>Shelter</span>
        </a>
        <a href="Profile_page.html" class="nav-item">
          <i class="bi bi-person"></i>
          <span>Profile</span>
        </a>
        <a href="Leaderboard_page.html" class="nav-item">
          <i class="bi bi-trophy"></i>
          <span>Leaderboard</span>
        </a>
        <a href="FriendsList_page.html" class="nav-item">
          <i class="bi bi-people"></i>
          <span>Friends</span>
        </a>
        <a
          class="logout-btn"
          onclick="document.getElementById('logout-modal').classList.add('active')"
        >
          <i class="bi bi-box-arrow-right"></i>
          <span>Logout</span>
        </a>
      </div>
    </nav>

    <div class="modal-overlay" id="logout-modal">
      <div class="modal">
        <h2 class="page-title">Log Out?</h2>
        <p class="page-subtitle">Are you sure you want to log out?</p>
        <div class="modal-buttons">
          <button
            class="cancel-btn"
            onclick="document.getElementById('logout-modal').classList.remove('active')"
          >
            Cancel
          </button>
          <a href="/logout" class="logout-confirm-btn">Log Out</a>
        </div>
      </div>
    </div>
  </body>
</html>
