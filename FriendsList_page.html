<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrsist Friend List</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="style.css" />
</head>
<body class="friends-page">
    <div class="card">
        <h1 class="page-title">Friends</h1>

        <div class="add-friend-section" id="add-friend-section">
            <button class="add-friend-btn" aria-label="Add Friend">
                <i class="bi bi-person-plus"></i>
            </button>

            <a href="#add-friend-form" class="add-friend-link">Add Friend</a>

            <div class="add-friend-form" id="add-friend-form">
                <input
                    type="text"
                    class="input-field"
                    placeholder="Enter username"
                />
                <button class="submit-friend-btn">Add</button>
            </div>
        </div>

        <div class="empty-friends-message">
            <a href="#add-friend-form" class="empty-friends-link">
                Add your first friend here!
            </a>
        </div>

        <div class="friends-list">
            <a href="#" class="friend-item">
                <div class="avatar">
                    <img src="images/profile-placeholder.png" alt="Profile placeholder" />
                </div>
                <span class="friend-name">User A</span>
            </a>
            
            <a href="#" class="friend-item">
                <div class="avatar">
                    <img src="images/profile-placeholder.png" alt="Profile placeholder" />
                </div>
                <span class="friend-name">User B</span>
            </a>

            <a href="#" class="friend-item">
                <div class="avatar">
                    <img src="images/profile-placeholder.png" alt="Profile placeholder" />
                </div>
                <span class="friend-name">User C</span>
            </a>

            <a href="#" class="friend-item">
                <div class="avatar">
                    <img src="images/profile-placeholder.png" alt="Profile placeholder" />
                </div>
                <span class="friend-name">User D</span>
            </a>

            <a href="#" class="friend-item">
                <div class="avatar">
                    <img src="images/profile-placeholder.png" alt="Profile placeholder" />
                </div>
                <span class="friend-name">User E</span>
            </a>
        </div>
    </div>
</body>
</html>
