<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrsist Leaderboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="leaderboard-page">
    <div class="card leaderboard-card">
        <h1 class="page-title">Leaderboard</h1>
        <div class="leaderboard-layout">
            
            <div class="leaderboard-section">
                <h2 class="leaderboard-title">Ranking</h2>
                
                <!-- <div class="leaderboard-list">
                    <div class="leaderboard-entry first-place">
                        <span class="friend-name">User A</span>
                        <span class="friend-streak">X days</span>
                    </div>

                    <div class="leaderboard-entry second-place">
                        <span class="friend-name">User B</span>
                        <span class="friend-streak">X days</span>
                    </div>

                    <div class="leaderboard-entry third-place">
                        <span class="friend-name">User C</span>
                        <span class="friend-streak">X days</span>
                    </div>

                    <div class="leaderboard-entry">
                        <span class="friend-name">other users</span>
                        <span class="friend-streak">X days</span>
                    </div>
                </div> -->

                <div class="leaderboard-list" id="leaderboard-list">
                    <!-- Leaderboard entries will be added by JavaScript -->
                </div>
            </div>
            
            <div class="leaderboard-section">
                <h2 class="leaderboard-title">Friends' Activity</h2>
                <div class="activity-feed">
                    <div class="activity-item">User A unlocked a cat</div>
                    <div class="activity-item">User B completed a habit</div>
                    <div class="activity-item">User C exercised for X days</div>
                    <div class="activity-item">User D completed a task</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample user data for the leaderboard
        const users = [
            {name: "Alan", streak: 10, completedHabits: 25},
            {name: "Bela", streak: 7, completedHabits: 30},
            {name: "Chloe", streak: 10, completedHabits: 18},
            {name: "Daniel", streak: 4, completedHabits: 40},
        ];

        // Sort users by streak first, then by completed habits
        function sortLeaderboard(users) {
            return users.sort(function(a, b) {
            if (b.streak !== a.streak) {
                return b.streak - a.streak;
            }

            return b.completedHabits - a.completedHabits;
            });
        }

        // Display the sorted leaderboard on the page
        function updateLeaderboard() {
            const leaderboardList = document.getElementById("leaderboard-list");
            const sortedUsers = sortLeaderboard(users);

            leaderboardList.innerHTML = "";

            sortedUsers.forEach(function(user, index) {
            const entry = document.createElement("div");
            entry.classList.add("leaderboard-entry");

            if (index === 0) {
                entry.classList.add("first-place");
            } else if (index === 1) {
                entry.classList.add("second-place");
            } else if (index === 2) {
                entry.classList.add("third-place");
            }

            entry.innerHTML = `
                <span class="friend-name">#${index + 1} ${user.name}</span>
                <span class="friend-streak">${user.streak} days | ${user.completedHabits} habits</span>
            `;

            leaderboardList.appendChild(entry);
            });
        }

        document.addEventListener("DOMContentLoaded", updateLeaderboard);
    </script>
</body>
</html>
